<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Sign up</title>
</head>
<body class="bg-[#FCF5EB] flex items-center justify-center">
    <main>
        <section class="min-h-screen flex flex-col items-center justify-center my-12 md:mt-16">
            <div class="w-full max-w-md bg-white rounded-3xl shadow-lg border border-slate-100 p-8">
                <button id="arrowback" class="w-10 h-10 bg-transparent rounded-full hover:bg-gray-200 flex items-center justify-center transition-colors">
                    <img src="assets/icons/arrow_back_.svg" alt="arrow_back_" class="w-6 h-6 pl-1">   
                </button>
                <div class="flex flex-col items-center mb-8">
                    <div class="w-12 h-12 bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/30 text-white font-medium rounded-2xl flex items-center justify-center mb-3">
                        <img src="assets/images/png-transparent-chat-message-communication-chatting-conversation-messaging-3d-icon-thumbnail-removebg-preview.png" alt="" class="w-10 h-10">
                    </div>
                    <h1 class="pt-2 font-extrabold bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/10 bg-clip-text text-transparent ">BestChat</h1>
                </div>
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-[#004AC6]">Create Account</h2>
                    <p class="text-sm text-slate-500">Join the community and start chatting.</p>
                </div>
                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Full Name</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </span>
                            <input type="text" id="username" placeholder="John Doe" required class="w-full pl-12 pr-4 py-3 bg-[#F0F4FA] text-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-[#0052CC]/20 text-sm transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Email Address</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </span>
                            <input type="email" id="email" placeholder="name@example.com" required class="w-full pl-12 pr-4 py-3 bg-[#F0F4FA] text-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-[#0052CC]/20 text-sm transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </span>
                            <input type="password" id="password" placeholder="••••••••" required class="w-full pl-12 pr-12 py-3 bg-[#F0F4FA] text-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-[#0052CC]/20 text-sm transition-all">
                            <button id="hidebtn1" type="button" class="absolute right-4 text-slate-400 hover:text-slate-600">
                               <svg id="eye-open-1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg id="eye-closed-1" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.411m0 0L21 21m-2.122-2.122L11.25 11.25m-.057-.057L9 9m-9 0a9 9 0 1118 0 9 9 0 01-9 9z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Confirm Password</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                            </span>
                            <input type="password" id="confirmpwd" placeholder="••••••••" required class="w-full pl-12 pr-12 py-3 bg-[#F0F4FA] text-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-[#0052CC]/20 text-sm transition-all">
                            <button id="hidebtn2" type="button" class="absolute right-4 text-slate-400 hover:text-slate-600">
                                <svg id="eye-open-2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                 <svg id="eye-closed-2" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.411m0 0L21 21m-2.122-2.122L11.25 11.25m-.057-.057L9 9m-9 0a9 9 0 1118 0 9 9 0 01-9 9z" />
                            </svg>
                            </button>
                        </div>
                    </div>
                    <div id="from-message" class="rounded-lg hidden p-3 text-sm"></div>
                    <button type="submit" id="createbtn" class="w-full p-[1px] rounded-full overflow-hidden bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/30 active:scale-95 transition-transform group">
                        <span id="createbtn-text" class="flex items-center justify-center gap-2 w-full px-6 py-3 rounded-full bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/30 text-white font-medium text-sm transition-all duration-200 group-hover:bg-white group-hover:bg-none group-hover:text-[#3B82F6]">
                            Create Account
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                        </span> 
                    </button>
                </form>
                <p class="text-[10px] text-center text-slate-400 mt-4 leading-relaxed px-4">By signing up, you agree to our <a href="#" class="text-[#0052CC] hover:underline">Terms of Service</a> and <a href="#" class="text-[#0052CC] hover:underline">Privacy Policy</a>.</p>
            </div>
            <p class="text-sm text-slate-600 mt-6">Already have an account? <a href="login.html" class="text-[#0052CC] font-medium hover:underline">Log in</a></p>
        </section>
    </main>

    <script type="module" src="assets/js/register.js"></script>

</body>
</html>
