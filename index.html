<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>BestChat</title>
</head>
<body class="bg-[#FCF5EB] flex items-center justify-center md:h-[100vh]">
    <main class=" max-sm:min-h-screen flex flex-col items-center justify-center max-sm:mx-8">
        <div class=" mx-auto  flex items-center gap-2 mb-4">
            <img src="assets/images/png-transparent-chat-message-communication-chatting-conversation-messaging-3d-icon-thumbnail-removebg-preview.png" alt="" class="w-10 h-10">
            <h1 class="pt-2 font-extrabold bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/10 bg-clip-text text-transparent ">BestChat</h1>
        </div>
        <section class="bg-white w-full max-w-sm mx-12 rounded-2xl h-[22rem] p-4 shadow-lg pt-8">
            <div class="bg-white flex justify-center w-20 h-20 rounded-full border border-[#25D366] mx-auto">
                <img src="assets/images/1f44b.gif" alt="hand" class="w-full h-full object-cover p-3" >
            </div>
            <div class="text-center">
                <h2 class="font-semibold text-[#004AC6] mb-2 md:text-xl">Welcome to BestChat</h2>
                <p class="text-xs text-gray-500 leading-relaxed mb-8 px-4">Ready to chat? Your conversations are fast, private, and secure.</p>
            </div>
            <div class="flex flex-col justify-center gap-4">
               <button id="login-btn" class="relative p-[1px] rounded-full overflow-hidden bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/30 active:scale-95 transition-transform group">
                    <span class="block px-6 py-3 rounded-full bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/30 text-white font-medium text-sm transition-all duration-200 group-hover:bg-[#FAF5EC] group-hover:bg-none group-hover:text-[#3B82F6]">
                         Sign in
                    </span>
                </button>
                <button id="register-btn"  class="relative p-[1px] rounded-full overflow-hidden bg-gradient-to-r from-[#3B82F6] via-[#6366F1]/60 to-[#7C3AED]/30 active:scale-95 transition-transform group">
                    <span class="block px-6 py-3 rounded-full bg-[#FAF5EC] text-[#3B82F6] font-medium text-sm transition-all duration-200 group-hover:bg-transparent group-hover:text-white">
                        Sign Up
                    </span>
                </button>
            </div>
        </section>
    </main>

    <script src="assets/js/index.js"></script>

</body>
</html>
