                <div>
                    <h2 id="chat-user-name">Select a conversation</h2>
                    <p id="chat-user-status" class="text-xs text-gray-500">No conversation selected</p>
                </div> 
                <div class="flex justify-center gap-2 ml-auto">

                <div class="flex items-center justify-center gap-2">
                    <button id="add-btn">

                        <button type="button" class="emoji-item">😂</button>

                        <button type="button" class="emoji-item">👍</button>
                        <button type="button" class="emoji-item">❤️</button>
                        <button type="button" class="emoji-item">🔥</button>
                        <button type="button" class="emoji-item">🎉</button>

                        <button type="button" class="emoji-item">👀</button>

                <input id="message-input" type="text" placeholder="Type a message..." class="flex-1 rounded-xl bg-gray-100 px-4 py-2 text-sm outline-none dark:bg-[#1E1F20]">
                <button class="bg-blue-600 text-white p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-6 h-6 text-white">
	                    <path d="M0 0h24v24H0z" fill="none" />

        <div class="w-[90%] max-w-md rounded-2xl bg-white dark:bg-gray-900 p-6 shadow-2xl">
            <h2 id="confirm-title" class="text-xl font-semibold text-gray-900 dark:text-white"> Confirmation</h2>
            <p id="confirm-message" class="mt-3 text-sm text-gray-500 dark:text-gray-400"></p>
            <div class="mt-6 flex justify-end gap-3">
                <button id="confirm-cancel" class="rounded-lg border px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">
                Cancel

                <button id="confirm-ok" class="rounded-lg bg-red-600 text-white px-4 py-2 hover:bg-red-700">
