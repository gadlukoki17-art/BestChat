<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Chat</title>
    <style>
         #messages-container::-webkit-scrollbar {
            display: none;
        }

        #messages-container {
            scrollbar-width: none;
        }
    </style>
</head>
<body class="h-full bg-slate-50 font-sans antialiased text-gray-900">
    <main class="flex w-full h-screen overflow-hidden bg-white pb-16 md:pb-0">
        <aside class="fixed bottom-0 left-0 right-0 h-16 z-50 flex md:static md:w-16 md:h-full md:flex-col items-center justify-around md:justify-start md:py-4 border-t md:border-t-0 md:border-r border-gray-200 bg-white shrink-0 px-2">
            <div class="flex md:flex-col w-full items-center justify-center md:gap-4 h-full">
                <div class="hidden md:flex p-2 text-center md:mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-8 h-8 text-[#2563EB]">
	                    <path d="M0 0h24v24H0z" fill="none" />
	                    <path fill="none" stroke="currentColor" stroke-width="1.5" d="M3 20.29V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7.961a2 2 0 0 0-1.561.75l-2.331 2.914A.6.6 0 0 1 3 20.29Z" />
                    </svg>
                </div>
                <div class="flex md:flex-col justify-center gap-4">
                    <button id="chat-btn" class="p-2 bg-blue-50 rounded-xl hover:bg-[#2563EB] transition-all duration-300 ease-in-out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-6 h-6 text-[#5C5F60] hover:text-white ">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="m6 18l-2.3 2.3q-.475.475-1.088.213T2 19.575V4q0-.825.588-1.412T4 2h16q.825 0 1.413.588T22 4v12q0 .825-.587 1.413T20 18zm1-4h6q.425 0 .713-.288T14 13t-.288-.712T13 12H7q-.425 0-.712.288T6 13t.288.713T7 14m0-3h10q.425 0 .713-.288T18 10t-.288-.712T17 9H7q-.425 0-.712.288T6 10t.288.713T7 11m0-3h10q.425 0 .713-.288T18 7t-.288-.712T17 6H7q-.425 0-.712.288T6 7t.288.713T7 8" />
                        </svg>
                    </button>
                    <button id="call-btn" class="p-2 bg-blue-50 rounded-xl hover:bg-[#2563EB] transition-all duration-300 ease-in-out">
                        <i class="fa-solid fa-phone w-6 h-6 hover:text-white text-[#5C5F60]"></i>
                    </button>
                    <button id="person-btn" class="p-2 bg-blue-50 rounded-xl hover:bg-[#2563EB] transition-all duration-300 ease-in-out">
                        <i class="fa-solid fa-user w-6 h-6 hover:text-white text-[#5C5F60]"></i>                
                    </button>
                    <button id="uploat-btn" class="p-2 bg-blue-50 rounded-xl hover:bg-[#2563EB] transition-all duration-300 ease-in-out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-6 h-6 hover:text-white text-[#5C5F60]">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="M4 20q-.825 0-1.412-.587T2 18V6q0-.825.588-1.412T4 4h5v2H4v12h16V6h-5V4h5q.825 0 1.413.588T22 6v12q0 .825-.587 1.413T20 20zm8-4.6l-5-5L8.4 9l2.6 2.6V4h2v7.6L15.6 9l1.4 1.4z" />
                        </svg>
                    </button>
                </div>

                <div class="hidden md:flex md:mt-auto ml-auto">
                    <button id="setting-btn" class="hover:bg-gray-200 p-2 rounded-full transition-all duration-300 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="text-[#5C5F60] w-6 h-6 hover:text-gray-800">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="M19.9 12.66a1 1 0 0 1 0-1.32l1.28-1.44a1 1 0 0 0 .12-1.17l-2-3.46a1 1 0 0 0-1.07-.48l-1.88.38a1 1 0 0 1-1.15-.66l-.61-1.83a1 1 0 0 0-.95-.68h-4a1 1 0 0 0-1 .68l-.56 1.83a1 1 0 0 1-1.15.66L5 4.79a1 1 0 0 0-1 .48L2 8.73a1 1 0 0 0 .1 1.17l1.27 1.44a1 1 0 0 1 0 1.32L2.1 14.1a1 1 0 0 0-.1 1.17l2 3.46a1 1 0 0 0 1.07.48l1.88-.38a1 1 0 0 1 1.15.66l.61 1.83a1 1 0 0 0 1 .68h4a1 1 0 0 0 .95-.68l.61-1.83a1 1 0 0 1 1.15-.66l1.88.38a1 1 0 0 0 1.07-.48l2-3.46a1 1 0 0 0-.12-1.17ZM18.41 14l.8.9l-1.28 2.22l-1.18-.24a3 3 0 0 0-3.45 2L12.92 20h-2.56L10 18.86a3 3 0 0 0-3.45-2l-1.18.24l-1.3-2.21l.8-.9a3 3 0 0 0 0-4l-.8-.9l1.28-2.2l1.18.24a3 3 0 0 0 3.45-2L10.36 4h2.56l.38 1.14a3 3 0 0 0 3.45 2l1.18-.24l1.28 2.22l-.8.9a3 3 0 0 0 0 3.98m-6.77-6a4 4 0 1 0 4 4a4 4 0 0 0-4-4m0 6a2 2 0 1 1 2-2a2 2 0 0 1-2 2" />
                        </svg>
                    </button>
                </div> 

            </div>
        </aside>

        <!-- conversation -->
        <section class="w-full md:w-80 md:border-r border-gray-200">
            <header>
                <div class="flex items-center gap-2 p-4 border-b border-gray-200">
                    <div>
                        <img id="current-user-avatar" src="assets/images/avatar.avif" alt="my profil" class="w-10 h-10 rounded-full object-cover">
                    </div>
                    <div>
                        <h2 id="current-user-name">Alex Rivera</h2>
                        <p class="text-sm text-[#5C5F60]">My Status:<span id="current-user-status">Active</span></p>
                    </div>
                    <div class="ml-auto">
                        <button id="edit-btn" class="w-9 h-9 rounded-full p-2 hover:bg-gray-100 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
	                            <path d="M0 0h24v24H0z" fill="none" />
	                            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
		                            <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
		                            <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z" />
	                            </g>
                            </svg>
                        </button>
                    </div>        
                </div>

                <div class="flex justify-center gap-1 bg-gray-100 rounded-xl py-[0.15rem] mt-4 m-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-7 h-7 pl-2">
	                    <path d="M0 0h24v24H0z" fill="none" />
	                    <path fill="currentColor" d="m19.485 20.154l-6.262-6.262q-.75.639-1.725.989t-1.96.35q-2.398 0-4.064-1.666Q3.808 11.898 3.808 9.5t1.666-4.064t4.064-1.667t4.065 1.667T15.269 9.5q0 1.042-.369 2.017t-.97 1.668l6.262 6.261zM9.539 14.23q1.99 0 3.36-1.37t1.37-3.361t-1.37-3.36t-3.36-1.37t-3.361 1.37t-1.37 3.36t1.37 3.36t3.36 1.37" />
                    </svg>
                    <input id="search-convesation" type="text" placeholder="Search conversations..." class="w-full text-sm outline-none pr-3">
                </div>        
            </header>
            <div id="conversation-list" class="flex-1 overflow-y-auto mt-4"></div>
        </section>

        <!-- zone de chat -->
         <section class="w-full hidden md:flex flex-1 flex-col">
            <header class="flex items-center justify-center gap-2 w-full px-4 py-2 border-b border-gray-200">
                <div>
                    <img id="chat-user-avatar" src="assets/images/avatar2.jfif" alt="profil" class="w-10 h-10 rounded-full object-cover">
                </div>
                <div>
                    <h2 id="chat-user-name">Select a conversation</h2>
                    <p id="chat-user-status" class="text-xs text-gray-500">No conversation selected</p>
                </div> 
                <div class="flex justify-center gap-2 ml-auto">
                    <button id="call-btn2" class="hover:bg-gray-200 p-2 rounded-full transition-all duration-300 ease-out">
                       <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-6 h-6 text-[#5C5F60]">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="M15 8v8H5V8zm1-2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4V7a1 1 0 0 0-1-1" />
                        </svg>
                    </button>
                    <button id="video-btn" class="hover:bg-gray-200 p-2 rounded-full transition-all duration-300 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-6 h-6 text-[#5C5F60]">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="M6.54 5c.06.89.21 1.76.45 2.59l-1.2 1.2c-.41-1.2-.67-2.47-.76-3.79zm9.86 12.02c.85.24 1.72.39 2.6.45v1.49c-1.32-.09-2.59-.35-3.8-.75zM7.5 3H4c-.55 0-1 .45-1 1c0 9.39 7.61 17 17 17c.55 0 1-.45 1-1v-3.49c0-.55-.45-1-1-1c-1.24 0-2.45-.2-3.57-.57a.8.8 0 0 0-.31-.05c-.26 0-.51.1-.71.29l-2.2 2.2a15.15 15.15 0 0 1-6.59-6.59l2.2-2.2c.28-.28.36-.67.25-1.02A11.4 11.4 0 0 1 8.5 4c0-.55-.45-1-1-1" />
                        </svg>
                    </button>
                    <button id="menu-btn" class="hover:bg-gray-200 p-2 rounded-full transition-all duration-300 ease-out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 16 16" class="w-6 h-6 text-[#5C5F60]">
	                        <path d="M0 0h16v16H0z" fill="none" />
	                        <path fill="currentColor" d="M7 4c0-.14 0-.209.008-.267a.85.85 0 0 1 .725-.725C7.79 3 7.86 3 8 3s.209 0 .267.008a.85.85 0 0 1 .725.725C9 3.79 9 3.86 9 4s0 .209-.008.267a.85.85 0 0 1-.725.725C8.21 5 8.14 5 8 5s-.209 0-.267-.008a.85.85 0 0 1-.725-.725C7 4.21 7 4.14 7 4m0 4c0-.14 0-.209.008-.267a.85.85 0 0 1 .725-.725C7.79 7 7.86 7 8 7s.209 0 .267.008a.85.85 0 0 1 .725.725C9 7.79 9 7.86 9 8s0 .209-.008.267a.85.85 0 0 1-.725.725C8.21 9 8.14 9 8 9s-.209 0-.267-.008a.85.85 0 0 1-.725-.725C7 8.21 7 8.14 7 8m0 4c0-.139 0-.209.008-.267a.85.85 0 0 1 .724-.724c.059-.008.128-.008.267-.008s.21 0 .267.008a.85.85 0 0 1 .724.724c.008.058.008.128.008.267s0 .209-.008.267a.85.85 0 0 1-.724.724c-.058.008-.128.008-.267.008s-.209 0-.267-.008a.85.85 0 0 1-.724-.724C7 12.209 7 12.139 7 12" />
                        </svg>
                    </button>
                </div>   
            </header>

            <!-- Message -->
             <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

            <!-- Input message -->
            <form id="message-form" class="bg-white border-t border-gray-200 p-4 flex items-center gap-3">
                <div class="flex items-center justify-center gap-2">
                    <button id="add-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-5 h-5 text-[#5C5F60] hover:text-gray-800 rounded-full">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="M12 4c4.411 0 8 3.589 8 8s-3.589 8-8 8s-8-3.589-8-8s3.589-8 8-8m0-2C6.477 2 2 6.477 2 12s4.477 10 10 10s10-4.477 10-10S17.523 2 12 2m5 9h-4V7h-2v4H7v2h4v4h2v-4h4z" />
                        </svg>
                    </button>
                    <button id="emoji-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-5 h-5 text-[#5C5F60] hover:text-gray-800 rounded-full">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
		                        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10s-4.477 10-10 10" />
		                        <path d="M16.5 14.5s-1.5 2-4.5 2s-4.5-2-4.5-2" />
		                        <path fill="currentColor" d="M15.5 9a.5.5 0 1 1 0-1a.5.5 0 0 1 0 1m-7 0a.5.5 0 1 1 0-1a.5.5 0 0 1 0 1" />
	                        </g>
                        </svg>
                    </button>
                </div>
                <input id="message-input" type="text" placeholder="Type a message..." class="flex-1 rounded-xl bg-gray-100 px-4 py-2 text-sm outline-none">
                <button class="bg-blue-600 text-white p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" class="w-6 h-6 text-white">
	                    <path d="M0 0h24v24H0z" fill="none" />
	                    <path fill="currentColor" d="M3 20V4l19 8zm2-3l11.85-5L5 7v3.5l6 1.5l-6 1.5zm0 0V7z" />
                    </svg>
                </button>
            </form>
         </section>
    </main>

    <script type="module" src="assets/js/chat.js"></script>

</body>
</html>
