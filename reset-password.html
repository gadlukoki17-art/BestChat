<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Rest password</title>
</head>
<body class="flex items-center justify-center">
    <main class="min-h-screen flex flex-col items-center justify-center">
        <section class="absolute w-full md:max-w-md max-w-[23rem]">
            <div class="flex flex-col items-center justify-center text-center mb-5">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex flex-col items-center justify-center shadow-md shadow-blue-200 mb-4">
                    <svg class="w-6 h-6 fill-current text-white" viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Set new password</h1>
                <p class="text-sm text-gray-500 mt-1">Your new password must be different from previously used passwords.</p>
            </div>
            <div class="w-full bg-white rounded-2xl border border-gray-100 p-6 sm:p-8 shadow-sm">
                <form id="reset-form" class="space-y-5">
                    <div class="flex flex-col gap-1.5">
                        <label for="verification-code" class="text-xs font-semibold text-gray-600">Verification Code</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="16" cy="8" r="4" stroke-linecap="round" stroke-linejoin="round"></circle>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.17 10.83L4 20"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18l1.5 1.5M9 15l1.5 1.5"></path>
                                </svg>
                            </span>
                            <input type="text" id="verification-code" required placeholder="Paste the code sent to your email" class="w-full pl-11 pr-4 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all font-mono tracking-wide">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="password" class="text-xs font-semibold text-gray-600">New Password</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </span>
                            <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                            <button id="hidebtn1" type="button" class="absolute right-4 text-slate-400 hover:text-slate-600">
                               <img id="eye-open-1" src="assets/icons/eyeclosed.svg" alt="eye-closed" class="w-5 h-5">
                               <img id="eye-closed-1" src="assets/icons/eyeopen.svg" alt="eye-open" class="w-5 h-5 hidden">
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="confirm-password" class="text-xs font-semibold text-gray-600">Confirm Password</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                                </svg>
                            </span>
                            <input type="password" id="confirm-password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                            <button id="hidebtn2" type="button" class="absolute right-4 text-slate-400 hover:text-slate-600">
                               <img id="eye-open-2" src="assets/icons/eyeclosed.svg" alt="eye-closed" class="w-5 h-5">
                               <img id="eye-closed-2" src="assets/icons/eyeopen.svg" alt="eye-open" class="w-5 h-5 hidden">
                            </button>
                        </div>
                    </div>

                    <div id="form-message" class="hidden"></div>
                    <button type="submit" id="resetbtn" class="w-full flex items-center justify-center gap-2 bg-blue-600 text-white font-semibold py-2.5 rounded-xl text-sm hover:bg-blue-700 active:scale-[0.99] transition-all cursor-pointer shadow-md shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed mt-2">
                        <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="btn-text">Reset Password</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="assets/js/reset-password.js"></script>

</body>
</html>
