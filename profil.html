                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl mb-10 ">
                    
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-xl flex flex-col justify-between dark:bg-[#1E1F20] dark:border-none">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-bold text-gray-900 text-base dark:text-white">Account Details</h3>
                                <i class="fa-regular fa-address-card text-gray-400 text-lg"></i>
                            </div>
                            
                            <div class="space-y-4">
                                <div>
                                    <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Username</p>
                                    <p class="text-sm font-medium text-gray-800 mt-0.5 dark:text-white">arivera_chat</p>
                                </div>
                                <div>
                                    <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Phone</p>
                                    <p id="profile-phone" class="text-sm font-medium text-gray-800 mt-0.5 dark:text-white">No phone number</p>
                                </div>
                                <div>
                                    <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Phone</p>
                                    <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider dark:text-white">Language</p>
                                    <p class="text-sm font-medium text-gray-800 mt-0.5 dark:text-white">English (US)</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-xl dark:bg-[#1E1F20] dark:text-white dark:border-none">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-gray-900 text-base dark:text-white">Privacy & Security</h3>
                            <i class="fa-solid fa-lock text-gray-400 text-base"></i>
                        </div>
                        
                        <div class="space-y-2">
                            <div class="flex items-center justify-between py-2.5 border-b border-gray-50">
                                <div class="flex items-center gap-3">
                                    <i class="fa-regular fa-shield text-gray-500 w-5 text-center"></i>
                                    <span class="text-sm font-medium text-gray-700 dark:text-white">Two-Factor Auth</span>
                                </div>
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 dark:bg-gray-700 px-2.5 py-0.5 rounded-full dark:text-white">Enabled</span>
                            </div>
                            <button class="w-full flex items-center justify-between py-2.5 rounded-lg px-1 transition-colors group">
                                <span class="flex items-center gap-3">
                                    <i class="fa-regular fa-eye text-gray-500 w-5 text-center"></i>
                                    <span class="text-sm font-medium text-gray-700 dark:text-white">Active Sessions</span>
                                </span>
                                <i class="fa-solid fa-chevron-right text-gray-400 text-xs transition-transform group-hover:translate-x-0.5"></i>
                            </button>
                            <button class="w-full flex items-center justify-between py-2.5 rounded-lg px-1 transition-colors group">
                                <span class="flex items-center gap-3">
                                    <i class="fa-regular fa-bell text-gray-500 w-5 text-center"></i>
                                    <span class="text-sm font-medium text-gray-700 dark:text-white">Alert Preferences</span>
                                </span>
                                <i class="fa-solid fa-chevron-right text-gray-400 text-xs transition-transform group-hover:translate-x-0.5"></i>
                            </button>
                        </div>
                    </div>

                </div>

                <div class="flex flex-col gap-4 w-full max-w-md items-center">
                    <p id="profile-message" class="hidden text-center text-sm"></p>
                    <button id="edit-profile-btn" class="w-full bg-[#2563EB] hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-blue-200 dark:shadow-none transition-all duration-300 flex items-center justify-center gap-2 text-sm active:scale-[0.98]">
                        <i class="fa-solid fa-pen text-xs"></i>
                         <span id="edit-profile-text">Edit Profile</span>
                    </button>
                    
                    <button class="w-full bg-[#E5E7EB] hover:bg-gray-300 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 text-sm dark:bg-slate-500 dark:hover:bg-slate-600 dark:text-white active:scale-[0.98]">
                        <i class="fa-solid fa-key text-xs"></i>
                        Change Password
                    </button>
                    
                    <button id="logout-btn" class="mt-4 flex items-center gap-2 text-red-600 font-bold text-sm hover:text-red-700 hover:underline transition-all">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        Logout
                    </button>
                </div>

            </div>
        </main>
    </div>
    <div id="edit-profile-modal" class="hidden fixed inset-0 z-[999] items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="w-[90%] max-w-md rounded-2xl bg-white p-6 shadow-2xl dark:bg-gray-900">
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Edit Profile</h2>
            <form id="edit-profile-form" class="mt-6 space-y-4">
                <div>
                    <label for="edit-fullname" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Full name
                    </label>
                    <input id="edit-fullname" type="text" required class="w-full rounded-xl border border-gray-200 px-4 py-2 outline-none focus:border-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                </div>
                <div>
                    <label for="edit-email" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Email
                    </label>
                    <input id="edit-email" type="email" required class="w-full rounded-xl border border-gray-200 px-4 py-2 outline-none focus:border-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                </div>
                <div>
                    <label for="edit-phone" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Phone number
                    </label>
                    <input id="edit-phone" type="tel" placeholder="+243 ..." class="w-full rounded-xl border border-gray-200 px-4 py-2 outline-none focus:border-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                    <p class="mt-1 text-xs text-gray-400">
                        This number is saved only on this device.
                    </p>
                </div>
                <div>
                    <label for="edit-bio" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">
                        Bio
                    </label>
                   <textarea id="edit-bio" rows="4" placeholder="Write something about yourself..."
                        class="w-full resize-none rounded-xl border border-gray-200 px-4 py-2 outline-none focus:border-blue-500 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                    </textarea>
                </div>
               <p id="edit-profile-message" class="hidden text-sm"></p>
               <div class="flex justify-end gap-3 pt-2">
                    <button id="cancel-edit-profile" type="button" class="rounded-lg border border-gray-200 px-4 py-2 hover:bg-gray-100 dark:border-gray-700 dark:hover:bg-gray-800">
                        Cancel
                    </button>
                    <button id="save-profile-btn" type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60">
                        Save
                    </button>
                </div>
           </form>
    </div>
</div>

    <script type="module" src="assets/js/profil.js"></script>

</body>
</html>
