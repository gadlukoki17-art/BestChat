<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
</head>
<body class="flex items-center justify-center">
    <main class="min-h-screen flex flex-col items-center justify-center   mx-4">
        <section class="w-full md:max-w-md">
            <div class="flex flex-col items-center mb-6 text-center">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-md shadow-blue-200 mb-4">
                    <svg class="w-6 h-6 fill-current text-white" viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-[#004AC6] tracking-tight">Welcome back</h1>
                <p class="text-sm text-gray-500 mt-1">Please enter your details to sign in to Kadea Chat</p>
            </div>
            <div class="w-full bg-white rounded-2xl border border-gray-100 p-6 sm:p-8 shadow-sm">
                <form id="login-form" class="space-y-5">
                
                    <div class="flex flex-col gap-1.5">
                        <label for="email" class="text-xs font-semibold text-gray-600">Email Address</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                </svg>
                            </span>
                            <input id="email" type="email"  required placeholder="name@company.com" class="w-full pl-11 pr-4 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <div class="flex justify-between items-center">
                            <label for="password" class="text-xs font-semibold text-gray-600">Password</label>
                            <a href="#" class="text-xs font-semibold text-blue-600 hover:underline">Forgot?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </span>
                            <input id="password" type="password" required placeholder="••••••••" class="w-full pl-11 pr-11 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                            <button type="button" id="hidebtn" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                                <img id="eye-open" src="assets/icons/eyeclosed.svg" alt="eye-closed" class="w-5 h-5">
                                <img id="eye-closed" src="assets/icons/eyeopen.svg" alt="eye-open" class="w-5 h-5 hidden">
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <input id="remember" type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                        <label for="remember" class="text-xs text-gray-500 cursor-pointer select-none">Keep me signed in</label>
                    </div>

                    <button id="loginbtn" type="submit" class="w-full flex items-center justify-center gap-2 bg-blue-600 text-white font-semibold py-2.5 rounded-xl text-sm hover:bg-blue-700 active:scale-[0.99] transition-all cursor-pointer shadow-md shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="btn-text">Login</span>
                    </button>
                </form>
            </div>

            <p class="text-sm text-gray-500 mt-6 text-center">
                Don't have an account? <a href="register.html" class="font-semibold text-blue-600 hover:underline">Create Account</a>
            </p>
        </section>
    </main> 
    
    <script type="module" src="assets/js/login.js"></script>

</body>
</html>
